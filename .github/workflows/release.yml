name: Release

# Per-plugin releases for the monorepo.
#   Final   -> push a tag  <Plugin>/v<semver>  e.g. FanControl.OpenRGB/v1.2.0
#              Builds & releases ONLY that plugin; version comes from the tag.
#   Nightly -> push to main / run manually. Builds ALL plugins into one
#              rolling 'nightly' prerelease; each zip is versioned
#              <plugin-last-version>-dev.<short-sha>.
on:
  push:
    tags: ['*/v*']
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned FanControl release used to fetch FanControl.Plugins.dll (the SDK
  # assembly the plugins compile against). Override in repo Settings ->
  # Secrets and variables -> Actions -> Variables: FANCONTROL_VERSION.
  FANCONTROL_VERSION: ${{ vars.FANCONTROL_VERSION || 'V269' }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.plan.outputs.mode }}
      plugins: ${{ steps.plan.outputs.plugins }}
      plugin: ${{ steps.plan.outputs.plugin }}
      version: ${{ steps.plan.outputs.version }}
      tag: ${{ steps.plan.outputs.tag }}
      release_name: ${{ steps.plan.outputs.release_name }}
      prerelease: ${{ steps.plan.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5

      - name: Plan release
        id: plan
        run: |
          ALL='["FanControl.OpenRGB","FanControl.Mqtt","FanControl.SystemMetrics"]'
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"        # FanControl.OpenRGB/v1.2.0
            PLUGIN="${TAG%/v*}"                   # FanControl.OpenRGB
            VERSION="${TAG##*/v}"                 # 1.2.0
            {
              echo "mode=final"
              echo "plugins=[\"${PLUGIN}\"]"
              echo "plugin=${PLUGIN}"
              echo "version=${VERSION}"
              echo "tag=${TAG}"
              echo "release_name=${PLUGIN} v${VERSION}"
              echo "prerelease=false"
            } >> "$GITHUB_OUTPUT"
          else
            SHA=$(git rev-parse --short HEAD)
            {
              echo "mode=nightly"
              echo "plugins=${ALL}"
              echo "tag=nightly"
              echo "release_name=Nightly build (${SHA})"
              echo "prerelease=true"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch FanControl.Plugins.dll
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          URL=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/Rem0o/FanControl.Releases/releases/tags/${FANCONTROL_VERSION}" \
            | jq -r '.assets[] | select(.name|test("\\.zip$")) | select(.name|test("net_4_8")|not) | .browser_download_url' \
            | head -n1)
          test -n "$URL" || { echo "No matching .zip asset for ${FANCONTROL_VERSION}"; exit 1; }
          echo "Downloading $URL"
          curl -fsSL "$URL" -o fc.zip
          mkdir -p lib
          # Extract only the SDK dll (root entry). Avoids unzip's non-zero
          # exit on the backslash-path warning emitted for other entries.
          unzip -oq fc.zip 'FanControl.Plugins.dll' -d lib
          test -f lib/FanControl.Plugins.dll || { echo "FanControl.Plugins.dll not found in asset"; exit 1; }

      - uses: actions/upload-artifact@v7
        with:
          name: fancontrol-sdk
          path: lib/FanControl.Plugins.dll
          retention-days: 1

  build:
    needs: setup
    runs-on: windows-2025
    strategy:
      fail-fast: false
      matrix:
        plugin: ${{ fromJSON(needs.setup.outputs.plugins) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # tags needed to derive the nightly version

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore SDK assembly
        uses: actions/download-artifact@v8
        with:
          name: fancontrol-sdk
          path: lib

      - name: Resolve version
        id: v
        shell: bash
        run: |
          set -euo pipefail
          P="${{ matrix.plugin }}"
          if [[ "${{ needs.setup.outputs.mode }}" == "final" ]]; then
            echo "version=${{ needs.setup.outputs.version }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Nightly: preview the NEXT version. Bump level is derived from the
          # Conventional Commit subjects touching this plugin since its last tag.
          SHA=$(git rev-parse --short HEAD)
          LASTTAG=$(git tag -l "${P}/v*" --sort=-v:refname | head -n1 || true)
          BASE="${LASTTAG##*/v}"; BASE="${BASE:-0.0.0}"
          IFS=. read -r MA MI PA <<< "$BASE"
          RANGE=""; [ -n "$LASTTAG" ] && RANGE="${LASTTAG}..HEAD"
          LOG=$(git log $RANGE --pretty='%s%n%b' -- "$P")
          if grep -qE '^[a-z]+(\([^)]*\))?!:|^BREAKING[ -]CHANGE' <<< "$LOG"; then
            MA=$((MA+1)); MI=0; PA=0
          elif grep -qE '^feat(\([^)]*\))?:' <<< "$LOG"; then
            MI=$((MI+1)); PA=0
          else
            PA=$((PA+1))
          fi
          echo "version=${MA}.${MI}.${PA}-dev.${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build ${{ matrix.plugin }}
        run: dotnet build ${{ matrix.plugin }}/${{ matrix.plugin }}.csproj -c Release -p:Version=${{ steps.v.outputs.version }}

      - name: Package
        shell: pwsh
        run: |
          $dll = "${{ matrix.plugin }}/bin/Release/net8.0-windows/${{ matrix.plugin }}.dll"
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path $dll -DestinationPath "dist/${{ matrix.plugin }}-${{ steps.v.outputs.version }}.zip" -Force

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.plugin }}
          path: dist/*.zip
          retention-days: 1

  release:
    needs: [setup, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history needed for the changelog

      - name: Collect plugin zips
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: FanControl.*
          merge-multiple: true

      - name: Generate changelog
        run: |
          set -euo pipefail
          # Drop project-management / housekeeping commits (matched at the
          # start of the subject so real features aren't filtered by accident).
          EXCLUDE='^- (initial commit|bump(ed|ing)?( version)?|version bump|release( [0-9v])|prepare release|updated? changelog|merge |(chore|ci|build|docs|style)(\(.*\))?:)'
          changelog_for() {  # $1 = plugin dir, $2 = current tag to exclude (optional)
            local p="$1" cur="${2:-}"
            local prev range
            prev=$(git tag -l "${p}/v*" --sort=-v:refname | grep -v "^${cur}$" | head -n1 || true)
            if [ -n "$prev" ]; then range="${prev}..HEAD"; else range=""; fi
            git log $range --no-merges --pretty='- %s (%h)' -- "$p" | grep -viE "$EXCLUDE" || true
          }
          {
            if [[ "${{ needs.setup.outputs.mode }}" == "final" ]]; then
              P="${{ needs.setup.outputs.plugin }}"
              echo "## ${P} v${{ needs.setup.outputs.version }}"
              echo
              changelog_for "$P" "${{ needs.setup.outputs.tag }}"
            else
              echo "## Nightly build"
              echo
              for p in FanControl.OpenRGB FanControl.Mqtt FanControl.SystemMetrics; do
                LOG=$(changelog_for "$p")
                if [ -n "$LOG" ]; then printf '### %s\n%s\n\n' "$p" "$LOG"; fi
              done
            fi
          } > changelog.md
          cat changelog.md

      - name: Reset nightly release
        if: needs.setup.outputs.mode == 'nightly'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete nightly --cleanup-tag --yes || true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag }}
          name: ${{ needs.setup.outputs.release_name }}
          body_path: changelog.md
          prerelease: ${{ needs.setup.outputs.prerelease }}
          target_commitish: ${{ github.sha }}
          files: dist/*.zip
